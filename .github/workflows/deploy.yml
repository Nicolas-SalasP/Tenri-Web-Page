name: Deploy Tenri Spa Monorepo

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout del código
        uses: actions/checkout@v3

      # ==========================================
      # 1. FRONTEND (REACT)
      # ==========================================
      - name: ⚙️ Setup Node.js (Frontend)
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      - name: 🏗️ Compilar Frontend (React)
        run: |
          cd frontend
          npm install
          npm run build

      - name: 🚀 Subir Frontend a public_html via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./frontend/dist/
          server-dir: /public_html/

      # ==========================================
      # 2. BACKEND (LARAVEL)
      # ==========================================
      - name: ⚙️ Setup PHP (Backend)
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: 📦 Instalar Dependencias y Comprimir Backend
        run: |
          cd backend
          composer install --optimize-autoloader --no-dev
          # Comprimimos para que la subida tarde segundos en vez de horas
          zip -r ../backend.zip . -x "node_modules/*" -x "tests/*"

      - name: 🚀 Subir Backend comprimido a tenri_backend via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: /tenri_backend/
          exclude: |
            **/*
            !backend.zip

      # ==========================================
      # 3. EJECUTAR COMANDOS EN EL SERVIDOR (SSH)
      # ==========================================
      - name: 🛠️ Descomprimir y Configurar Laravel en cPanel
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          port: 22 
          script: |
            # Entrar a la carpeta del backend
            cd ~/tenri_backend
            
            # Descomprimir el código fresco y limpiar el zip
            unzip -o backend.zip
            rm backend.zip
            
            # Recrear el enlace simbólico de la API hacia tu dominio específico
            rm -rf ~/domains/tenri.cl/public_html/api
            
            # Creamos el enlace nuevo apuntando a la carpeta public del backend
            ln -s ~/tenri_backend/public ~/domains/tenri.cl/public_html/api
            
            # Comandos de optimización
            php artisan migrate --force
            php artisan optimize:clear
            php artisan config:cache
            php artisan storage:link